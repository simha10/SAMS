# Cloud Build configuration for SAMS Backend
# This file defines the build pipeline for Google Cloud Build
# It is documented for manual deployment - NOT automatically executed

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sams-backend:$COMMIT_SHA', '.']
    dir: 'backend'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sams-backend:$COMMIT_SHA']

  # Step 3: Tag the image as latest
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'gcr.io/$PROJECT_ID/sams-backend:$COMMIT_SHA', 'gcr.io/$PROJECT_ID/sams-backend:latest']

  # Step 4: Push the latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sams-backend:latest']

# Define images to be pushed to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/sams-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sams-backend:latest'

# Define timeout for the build (default is 10 minutes)
timeout: 1200s

# Define substitutions that can be used in the build
substitutions:
  _SERVICE_NAME: sams-backend
  _REGION: us-central1

# Define artifacts to be stored
artifacts:
  objects:
    location: 'gs://$_PROJECT_ID-cloudbuild-artifacts/'
    paths: ['backend/cloudbuild.yaml']

# Define options for the build
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'